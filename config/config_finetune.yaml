task_name: bbbp        # 分类：bace, bbbp, clintox, tox21, toxcast, sider
# 回归：freesolv, esol, lipophilicity

batch_size: 128
seed: 42
epochs: 100
patience: 20

userconfig:
  mpp:
    dataset_dir: ./processed_data1/mpp/pkl/toxcast
    split_dir: ./processed_data1/mpp/split/

mode: finetune
split_type: scaffold         # random, scaffold, random_scaffold
save_ckpt: 50
save_model: best_valid
pretrain_model_path: None
checkpoint: False
DP: False

optim:
  type: adam
  init_lr: 0.0001         # initial learning rate for the prediction head
  init_base_lr: 0.0001           # initial learning rate for the base GNN encoder
  weight_decay: 0.0001             # weight decay of Adam

lr_scheduler:
  type: None
  warm_up_epoch: 10
  start_lr: 0.00001

model:
  atom_embed_dim: 512
  num_kernel: 128
  layer_num: 6
  num_heads: 8
  hidden_size: 2048
  num_tasks: None